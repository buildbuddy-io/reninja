x_templates:
  - &install_go |
    if ! [ -x "$(command -v go)" ] || true; then
      curl -LO https://go.dev/dl/go1.25.6.linux-amd64.tar.gz
      sudo rm -rf /usr/local/go && sudo tar -C /usr/local -xzf go1.25.6.linux-amd64.tar.gz
      echo 'export PATH=$PATH:/usr/local/go/bin' >> ~/.bashrc
    fi
  - &install_gh_cli |
    if ! [ -x "$(command -v gh)" ]; then
      curl -LO https://github.com/cli/cli/releases/download/v2.67.0/gh_2.67.0_linux_amd64.tar.gz
      sudo tar -C /usr/local -xzf gh_2.67.0_linux_amd64.tar.gz --strip-components=1
    fi
  - &install_cmake |
    if ! [ -x "$(command -v cmake)" ]; then
      curl -LO https://github.com/Kitware/CMake/releases/download/v4.3.0-rc1/cmake-4.3.0-rc1-linux-x86_64.sh
      sudo sh cmake-4.3.0-rc1-linux-x86_64.sh --skip-license --prefix=/usr/local
    fi

actions:
  - name: "[Reninja] Unit Tests"
    container_image: "ubuntu-24.04"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    steps:
      - run: *install_go
      - run: "source ~/.bashrc && go test ./..."
  - name: "[Reninja] Output Tests"
    container_image: "ubuntu-24.04"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    steps:
      - run: *install_go
      - run: "source ~/.bashrc && go build cmd/ninja/ninja.go"
      - run: "misc/output_test.py"
  - name: "[Reninja] Parity Tests"
    container_image: "ubuntu-24.04"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    steps:
      - run: *install_go
      - run: *install_cmake
      - run: "source ~/.bashrc && go build cmd/ninja/ninja.go && sudo mv ninja /usr/local/bin/ninja"
      - run: "source ~/.bashrc && ./parity_tests/generate_testdata.sh"
      - run: "source ~/.bashrc && go test -tags=parity ./parity_tests/"
  - name: "[Reninja] Release"
    container_image: "ubuntu-24.04"
    triggers:
      push:
        tags:
          - "v*"
    steps:
      - run: *install_go
      - run: *install_gh_cli
      - run: 'if [[ -z "$GIT_TAG" ]]; then echo "Error: GIT_TAG must be set"; exit 1; fi'
      - run: 'source ~/.bashrc && go build -ldflags="-s -w" cmd/ninja/ninja.go'
      - run: 'GH_TOKEN=$RENINJA_RELEASE_TOKEN gh release create "$GIT_TAG" --generate-notes --draft --title="Version $GIT_TAG" --verify-tag'
      - run: 'GH_TOKEN=$RENINJA_RELEASE_TOKEN gh release upload "$GIT_TAG" ./ninja'
      - run: 'GH_TOKEN=$RENINJA_RELEASE_TOKEN gh release edit "$GIT_TAG" --draft=false'
