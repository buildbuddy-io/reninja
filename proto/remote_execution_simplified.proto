syntax = "proto3";

package build.bazel.remote.execution.v2;

option go_package = "github.com/buildbuddy-io/gin/proto/remoteexecution";

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

// Content Addressable Storage
service ContentAddressableStorage {
  rpc FindMissingBlobs(FindMissingBlobsRequest) returns (FindMissingBlobsResponse);
  rpc BatchUpdateBlobs(BatchUpdateBlobsRequest) returns (BatchUpdateBlobsResponse);
  rpc BatchReadBlobs(BatchReadBlobsRequest) returns (BatchReadBlobsResponse);
  rpc GetTree(GetTreeRequest) returns (stream GetTreeResponse);
}

// Action Cache 
service ActionCache {
  rpc GetActionResult(GetActionResultRequest) returns (ActionResult);
  rpc UpdateActionResult(UpdateActionResultRequest) returns (ActionResult);
}

// Execution Service
service Execution {
  rpc Execute(ExecuteRequest) returns (stream Operation);
  rpc WaitExecution(WaitExecutionRequest) returns (stream Operation);
}

// Capabilities Service
service Capabilities {
  rpc GetCapabilities(GetCapabilitiesRequest) returns (ServerCapabilities);
}

message Digest {
  string hash = 1;
  int64 size_bytes = 2;
}

message Action {
  Digest command_digest = 1;
  Digest input_root_digest = 2;
  google.protobuf.Duration timeout = 4;
  bool do_not_cache = 5;
  Platform platform = 7;
}

message Command {
  repeated string arguments = 1;
  repeated EnvironmentVariable environment_variables = 2;
  repeated string output_files = 3;
  repeated string output_directories = 4;
  repeated string output_paths = 7;
  Platform platform = 5;
  string working_directory = 6;
}

message EnvironmentVariable {
  string name = 1;
  string value = 2;
}

message Platform {
  repeated Property properties = 1;
}

message Property {
  string name = 1;
  string value = 2;
}

message Directory {
  repeated FileNode files = 1;
  repeated DirectoryNode directories = 2;
  repeated SymlinkNode symlinks = 3;
  NodeProperties node_properties = 5;
}

message FileNode {
  string name = 1;
  Digest digest = 2;
  bool is_executable = 3;
  NodeProperties node_properties = 5;
}

message DirectoryNode {
  string name = 1;
  Digest digest = 2;
}

message SymlinkNode {
  string name = 1;
  string target = 2;
  NodeProperties node_properties = 3;
}

message NodeProperties {
  repeated Property properties = 1;
  google.protobuf.Timestamp mtime = 2;
}

message Tree {
  Directory root = 1;
  repeated Directory children = 2;
}

message ActionResult {
  repeated OutputFile output_files = 2;
  repeated OutputDirectory output_directories = 3;
  repeated OutputSymlink output_symlinks = 10;
  int32 exit_code = 4;
  bytes stdout_raw = 5;
  bytes stderr_raw = 6;
  Digest stdout_digest = 7;
  Digest stderr_digest = 8;
  ExecutedActionMetadata execution_metadata = 9;
}

message OutputFile {
  string path = 1;
  Digest digest = 2;
  bool is_executable = 3;
  bytes contents = 4;
  NodeProperties node_properties = 5;
}

message OutputDirectory {
  string path = 1;
  Digest tree_digest = 3;
}

message OutputSymlink {
  string path = 1;
  string target = 2;
  NodeProperties node_properties = 3;
}

message ExecutedActionMetadata {
  string worker = 1;
  google.protobuf.Timestamp queued_timestamp = 2;
  google.protobuf.Timestamp worker_start_timestamp = 3;
  google.protobuf.Timestamp worker_completed_timestamp = 4;
  google.protobuf.Timestamp input_fetch_start_timestamp = 5;
  google.protobuf.Timestamp input_fetch_completed_timestamp = 6;
  google.protobuf.Timestamp execution_start_timestamp = 7;
  google.protobuf.Timestamp execution_completed_timestamp = 8;
  google.protobuf.Timestamp output_upload_start_timestamp = 9;
  google.protobuf.Timestamp output_upload_completed_timestamp = 10;
}

message ExecuteRequest {
  string instance_name = 1;
  bool skip_cache_lookup = 2;
  Digest action_digest = 3;
  ExecutionPolicy execution_policy = 4;
  ResultsCachePolicy results_cache_policy = 5;
}

message ExecutionPolicy {
  int32 priority = 1;
}

message ResultsCachePolicy {
  int32 priority = 1;
}

message ExecuteResponse {
  ActionResult result = 1;
  bool cached_result = 2;
  Status status = 3;
  string message = 5;
}

message Status {
  int32 code = 1;
  string message = 2;
}

message Operation {
  string name = 1;
  bool done = 2;
  oneof result {
    ExecuteResponse response = 3;
    Status error = 4;
  }
}

message WaitExecutionRequest {
  string name = 1;
}

message FindMissingBlobsRequest {
  string instance_name = 1;
  repeated Digest blob_digests = 2;
}

message FindMissingBlobsResponse {
  repeated Digest missing_blob_digests = 2;
}

message BatchUpdateBlobsRequest {
  string instance_name = 1;
  repeated Request requests = 2;
  
  message Request {
    Digest digest = 1;
    bytes data = 2;
    int32 compressor = 3;
  }
}

message BatchUpdateBlobsResponse {
  repeated Response responses = 1;
  
  message Response {
    Digest digest = 1;
    Status status = 2;
  }
}

message BatchReadBlobsRequest {
  string instance_name = 1;
  repeated Digest digests = 2;
  repeated Compressor.Value acceptable_compressors = 3;
}

message BatchReadBlobsResponse {
  repeated Response responses = 1;
  
  message Response {
    Digest digest = 1;
    bytes data = 2;
    Compressor.Value compressor = 3;
    Status status = 4;
  }
}

message Compressor {
  enum Value {
    IDENTITY = 0;
    ZSTD = 1;
  }
}

message GetTreeRequest {
  string instance_name = 1;
  Digest root_digest = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message GetTreeResponse {
  repeated Directory directories = 1;
  string next_page_token = 2;
}

message GetActionResultRequest {
  string instance_name = 1;
  Digest action_digest = 2;
  bool inline_stdout = 3;
  bool inline_stderr = 4;
  repeated string inline_output_files = 5;
}

message UpdateActionResultRequest {
  string instance_name = 1;
  Digest action_digest = 2;
  ActionResult action_result = 3;
  ResultsCachePolicy results_cache_policy = 4;
}

message GetCapabilitiesRequest {
  string instance_name = 1;
}

message ServerCapabilities {
  CacheCapabilities cache_capabilities = 1;
  ExecutionCapabilities execution_capabilities = 2;
  string low_api_version = 3;
  string high_api_version = 4;
}

message CacheCapabilities {
  repeated DigestFunction.Value digest_functions = 1;
  ActionCacheUpdateCapabilities action_cache_update_capabilities = 2;
  repeated Compressor.Value supported_compressors = 3;
  int64 max_batch_total_size_bytes = 4;
}

message ActionCacheUpdateCapabilities {
  bool update_enabled = 1;
}

message ExecutionCapabilities {
  DigestFunction.Value digest_function = 1;
  bool exec_enabled = 2;
  PriorityCapabilities execution_priority_capabilities = 3;
  repeated Compressor.Value supported_node_properties = 4;
}

message PriorityCapabilities {
  repeated PriorityRange priorities = 1;
  
  message PriorityRange {
    int32 min_priority = 1;
    int32 max_priority = 2;
  }
}

message DigestFunction {
  enum Value {
    UNKNOWN = 0;
    SHA256 = 1;
    SHA1 = 2;
    MD5 = 3;
    SHA384 = 5;
    SHA512 = 6;
  }
}